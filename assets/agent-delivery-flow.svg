<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="560" viewBox="0 0 1160 560" role="img" aria-labelledby="title desc">
  <title id="title">AI DevFlow Engine delivery flow</title>
  <desc id="desc">An animated two-row workflow diagram for AI DevFlow Engine, showing six core delivery stages, human approval gates, high-risk tool confirmation, and an approval rework loop.</desc>

  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#26303b" stroke-width="1" opacity="0.42"/>
      <circle cx="0" cy="0" r="1.05" fill="#465462" opacity="0.54"/>
    </pattern>

    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121923"/>
      <stop offset="0.56" stop-color="#0b1118"/>
      <stop offset="1" stop-color="#0e1716"/>
    </linearGradient>

    <linearGradient id="card-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#202a38"/>
      <stop offset="1" stop-color="#151d28"/>
    </linearGradient>

    <linearGradient id="flow-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>

    <filter id="shadow" x="-14%" y="-20%" width="128%" height="146%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <filter id="soft-glow" x="-40%" y="-45%" width="180%" height="190%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.09 0 0 0 0 0.78 0 0 0 0 0.68 0 0 0 0.42 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrow-muted" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0 0L7.4 4L0 8Z" fill="#566273"/>
    </marker>

    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0 0L7.4 4L0 8Z" fill="#a78bfa"/>
    </marker>

    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0 0L7.4 4L0 8Z" fill="#f59e0b"/>
    </marker>

    <style>
      .bg { fill: url(#background); }
      .grid { fill: url(#grid); opacity: 0.82; }
      .halo-a { fill: #0f766e; opacity: 0.08; }
      .halo-b { fill: #2563eb; opacity: 0.06; }
      .title { font: 800 15px "Segoe UI", Arial, sans-serif; fill: #5eead4; letter-spacing: 0; }
      .subtitle { font: 500 14px "Segoe UI", Arial, sans-serif; fill: #9aa8b8; letter-spacing: 0; }
      .stage-card { fill: url(#card-fill); stroke: #465262; stroke-width: 1.35; filter: url(#shadow); }
      .stage-kicker { font: 800 11px "Segoe UI", Arial, sans-serif; fill: #5eead4; letter-spacing: 0; }
      .stage-title { font: 760 18px "Segoe UI", Arial, sans-serif; fill: #eff6f6; letter-spacing: 0; }
      .terminal { fill: #111923; stroke: #14b8a6; stroke-width: 2; filter: url(#soft-glow); }
      .terminal-end { fill: #111923; stroke: #22c55e; stroke-width: 2; filter: url(#soft-glow); }
      .terminal-title { font: 800 17px "Segoe UI", Arial, sans-serif; fill: #f4fbfb; letter-spacing: 0; }
      .terminal-subtitle { font: 650 11px "Segoe UI", Arial, sans-serif; fill: #9fb0bc; letter-spacing: 0; }
      .rail-base { fill: none; stroke: #485465; stroke-width: 2.4; stroke-linecap: round; stroke-dasharray: 9 13; marker-end: url(#arrow-muted); opacity: 0.84; }
      .rail-flow { fill: none; stroke: url(#flow-accent); stroke-width: 3.1; stroke-linecap: round; stroke-dasharray: 18 430; animation: mainFlow 5.8s linear infinite; opacity: 0.94; }
      .control-line { fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 7 11; opacity: 0.86; }
      .human-line { stroke: #a78bfa; marker-end: url(#arrow-purple); }
      .tool-line { stroke: #a78bfa; marker-end: url(#arrow-purple); }
      .gate-chip { filter: url(#shadow); }
      .human-chip { fill: #1b1728; stroke: #8b5cf6; stroke-width: 1.25; }
      .tool-chip { fill: #1b1728; stroke: #8b5cf6; stroke-width: 1.25; }
      .chip-kicker { font: 800 10px "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
      .human-kicker { fill: #c4b5fd; }
      .tool-kicker { fill: #c4b5fd; }
      .chip-title { font: 740 14px "Segoe UI", Arial, sans-serif; fill: #f7f4ff; letter-spacing: 0; }
      .regression-base { fill: none; stroke: #f59e0b; stroke-width: 1.9; stroke-linecap: round; stroke-dasharray: 7 10; marker-end: url(#arrow-amber); opacity: 0.72; }
      .regression-flow { fill: none; stroke: #fbbf24; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 16 310; animation: regressionFlow 5.8s linear infinite; opacity: 0.8; }
      .regression-label-bg { fill: #171712; stroke: #8f6b1d; stroke-width: 1; }
      .regression-kicker { font: 800 9px "Segoe UI", Arial, sans-serif; fill: #f4c765; letter-spacing: 0; }
      .regression-label { font: 740 12px "Segoe UI", Arial, sans-serif; fill: #fff1bd; letter-spacing: 0; }

      @keyframes mainFlow {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -448; }
      }

      @keyframes regressionFlow {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -326; }
      }
    </style>
  </defs>

  <rect class="bg" width="1160" height="560"/>
  <rect class="grid" width="1160" height="560"/>
  <circle class="halo-a" cx="166" cy="112" r="160"/>
  <circle class="halo-b" cx="1084" cy="492" r="210"/>

  <text x="64" y="58" class="title">AI DEVFLOW ENGINE</text>
  <text x="64" y="86" class="subtitle">A delivery run moves through six core stages, with approval and risk controls branching from the workflow.</text>

  <path class="rail-base" d="M122 215H1080C1128 215 1128 417 1080 417H122"/>
  <path class="rail-flow" d="M122 215H1080C1128 215 1128 417 1080 417H122"/>

  <g transform="translate(50 179)">
    <circle class="terminal" cx="36" cy="36" r="36"/>
    <text class="terminal-title" x="36" y="42" text-anchor="middle">Start</text>
  </g>

  <g transform="translate(186 174)">
    <rect class="stage-card" width="248" height="82" rx="8"/>
    <text class="stage-kicker" x="22" y="27">01 / INTAKE</text>
    <text class="stage-title" x="22" y="57">Requirement Analysis</text>
  </g>

  <g transform="translate(494 174)">
    <rect class="stage-card" width="248" height="82" rx="8"/>
    <text class="stage-kicker" x="22" y="27">02 / DESIGN</text>
    <text class="stage-title" x="22" y="57">Solution Design</text>
  </g>

  <g transform="translate(802 174)">
    <rect class="stage-card" width="248" height="82" rx="8"/>
    <text class="stage-kicker" x="22" y="27">03 / WORKSPACE</text>
    <text class="stage-title" x="22" y="57">Code Generation</text>
  </g>

  <g transform="translate(802 376)">
    <rect class="stage-card" width="248" height="82" rx="8"/>
    <text class="stage-kicker" x="22" y="27">04 / EVIDENCE</text>
    <text class="stage-title" x="22" y="57">Test Execution</text>
  </g>

  <g transform="translate(494 376)">
    <rect class="stage-card" width="248" height="82" rx="8"/>
    <text class="stage-kicker" x="22" y="27">05 / QUALITY</text>
    <text class="stage-title" x="22" y="57">Code Review</text>
  </g>

  <g transform="translate(186 376)">
    <rect class="stage-card" width="248" height="82" rx="8"/>
    <text class="stage-kicker" x="22" y="27">06 / DELIVERY</text>
    <text class="stage-title" x="22" y="57">Delivery Integration</text>
  </g>

  <g transform="translate(50 381)">
    <circle class="terminal-end" cx="36" cy="36" r="36"/>
    <text class="terminal-title" x="36" y="34" text-anchor="middle">End</text>
    <text class="terminal-subtitle" x="36" y="55" text-anchor="middle">Record</text>
  </g>

  <path class="control-line human-line" d="M772 215V152"/>
  <g class="gate-chip" transform="translate(692 106)">
    <rect class="human-chip" width="160" height="46" rx="23"/>
    <text class="chip-kicker human-kicker" x="14" y="19">HUMAN GATE</text>
    <text class="chip-title" x="14" y="36">Solution Approval</text>
  </g>

  <path class="control-line human-line" d="M464 417V480"/>
  <g class="gate-chip" transform="translate(389 480)">
    <rect class="human-chip" width="150" height="46" rx="23"/>
    <text class="chip-kicker human-kicker" x="14" y="19">HUMAN GATE</text>
    <text class="chip-title" x="14" y="36">Review Approval</text>
  </g>

  <path class="control-line tool-line" d="M926 256V293"/>
  <path class="control-line tool-line" d="M926 376V339"/>
  <g class="gate-chip" transform="translate(846 293)">
    <rect class="tool-chip" width="160" height="46" rx="23"/>
    <text class="chip-kicker tool-kicker" x="14" y="19">RISK GATE</text>
    <text class="chip-title" x="14" y="36">Tool Confirmation</text>
  </g>

  <path class="regression-base" d="M620 376V342Q620 318 644 318H784Q808 318 808 294V256"/>
  <path class="regression-flow" d="M620 376V342Q620 318 644 318H784Q808 318 808 294V256"/>
  <g transform="translate(650 297)">
    <rect class="regression-label-bg" width="128" height="42" rx="21"/>
    <text class="regression-kicker" x="16" y="17">APPROVAL</text>
    <text class="regression-label" x="16" y="32">Rework Loop</text>
  </g>
</svg>
