[alembic]
script_location = backend/alembic
prepend_sys_path = .
path_separator = os

[alembic:control]
sqlalchemy.url = sqlite:///%(here)s/../.runtime/control.db

[alembic:runtime]
sqlalchemy.url = sqlite:///%(here)s/../.runtime/runtime.db

[alembic:graph]
sqlalchemy.url = sqlite:///%(here)s/../.runtime/graph.db

[alembic:event]
sqlalchemy.url = sqlite:///%(here)s/../.runtime/event.db

[alembic:log]
sqlalchemy.url = sqlite:///%(here)s/../.runtime/log.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
